contentRoot: ./fixtures/content
stateRoot: ./.symlink-hub
defaultMode: symlink

agents:
  codex:
    agentFileName: CODEX.md
    roots:
      skill: .codex/skills
      rule: .codex/rules
      doc: .codex/docs
      command: .codex/commands
  claude:
    agentFileName: CLAUDE.md
    roots:
      skill: .claude/skills
      rule: .claude/rules
      doc: .claude/docs
      command: .claude/commands

projects:
  - name: backend
    path: ./fixtures/projects/backend
    agents:
      - codex
    includeTags:
      - global
      - backend
      - auth
    excludeTags:
      - experimental
    features:
      - backend
    mode: symlink
    conflict: replace
